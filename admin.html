<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>随机数管理后台</title>
<link rel="shortcut icon" href="/www.kexuejisuanqi.com-icon.ico" type="image/x-icon">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"微软雅黑",sans-serif;background:#f5ede4;min-height:100vh;color:#333}

/* ── 顶栏 ── */
.topbar{
  background:#7c4328;color:#fff;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:52px;
}
.topbar .title{font-size:17px;font-weight:bold;letter-spacing:1px}
.topbar .logout{
  font-size:13px;color:rgba(255,255,255,.75);cursor:pointer;
  text-decoration:none;padding:5px 12px;border:1px solid rgba(255,255,255,.35);
  border-radius:4px;transition:.2s;
}
.topbar .logout:hover{background:rgba(255,255,255,.15);color:#fff}

/* ── 容器 ── */
.wrap{max-width:760px;margin:28px auto;padding:0 16px}

/* ── 卡片 ── */
.card{
  background:#fff;border-radius:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
  padding:24px 28px;margin-bottom:20px;
}
.card-title{
  font-size:15px;font-weight:bold;color:#7c4328;
  margin-bottom:18px;padding-bottom:10px;
  border-bottom:1px solid #ede3db;
}

/* ── 开关 ── */
.switch-row{display:flex;align-items:center;gap:16px}
.switch{position:relative;display:inline-block;width:52px;height:28px}
.switch input{opacity:0;width:0;height:0}
.slider{
  position:absolute;inset:0;background:#ccc;border-radius:28px;
  cursor:pointer;transition:.3s;
}
.slider:before{
  content:"";position:absolute;width:22px;height:22px;
  left:3px;bottom:3px;background:#fff;border-radius:50%;
  transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.2);
}
input:checked+.slider{background:#a4672e}
input:checked+.slider:before{transform:translateX(24px)}
.switch-label{font-size:14px;color:#555}
#status-tag{
  font-size:12px;padding:3px 10px;border-radius:12px;font-weight:bold;
}
.tag-on{background:#fff3e0;color:#a4672e}
.tag-off{background:#eee;color:#999}

/* ── 表单 ── */
.form-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;color:#7c4328;font-weight:bold}
.field input,.field select{
  padding:8px 10px;border:1px solid #d0ad9a;border-radius:5px;
  font-size:14px;font-family:inherit;width:100%;
}
.field input:focus,.field select:focus{
  outline:none;border-color:#a4672e;
  box-shadow:0 0 0 2px rgba(164,103,46,.15);
}
.f-sm{width:90px}
.f-md{width:110px}
.f-lg{width:140px}

/* ── 模板按钮 ── */
.tpl-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.tpl-row span{font-size:12px;color:#7c4328;font-weight:bold;margin-right:4px}
.tpl-btn{
  width:36px;height:36px;border-radius:6px;
  border:2px solid #d0ad9a;background:#fff;
  font-size:15px;font-weight:bold;color:#7c4328;
  cursor:pointer;transition:.15s;
  display:flex;align-items:center;justify-content:center;
}
.tpl-btn:hover{border-color:#a4672e;background:#fff8f3}
.tpl-btn.active{background:#a4672e;border-color:#a4672e;color:#fff}

/* ── 数字格子 ── */
.num-boxes{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;min-height:52px;align-items:center}
.num-box{
  width:58px;height:50px;text-align:center;padding:0;
  border:2px solid #d0ad9a;border-radius:8px;
  font-size:18px;font-weight:bold;color:#7c4328;font-family:inherit;
  transition:.15s;
}
.num-box:focus{outline:none;border-color:#a4672e;box-shadow:0 0 0 2px rgba(164,103,46,.15)}
.num-box::placeholder{font-size:13px;font-weight:normal;color:#ccc}

/* ── 按钮 ── */
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn{
  padding:9px 22px;border:none;border-radius:6px;
  font-size:14px;font-family:inherit;cursor:pointer;transition:.2s;
}
.btn-primary{background:#a4672e;color:#fff}
.btn-primary:hover{background:#7c4328}
.btn-secondary{background:#f0e8e0;color:#7c4328;border:1px solid #d0ad9a}
.btn-secondary:hover{background:#e5d6c9}
.btn-danger{background:#fff;color:#e53935;border:1px solid #e53935;padding:5px 12px;font-size:13px;border-radius:4px}
.btn-danger:hover{background:#ffeaea}

/* ── 结果提示 ── */
#form-msg{margin-top:12px;font-size:13px;min-height:18px}
.msg-ok{color:#2e7d32}.msg-err{color:#e53935}

/* ── 预设列表 ── */
.list-toggle{
  font-size:13px;color:#a4672e;cursor:pointer;
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 12px;border:1px solid #d0ad9a;border-radius:5px;
  background:#fff8f3;transition:.15s;user-select:none;
}
.list-toggle:hover{background:#f0e0d0}
#preset-list{display:none;margin-top:16px}

.preset-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-radius:7px;margin-bottom:8px;
  background:#faf6f2;border:1px solid #ede3db;
  font-size:13px;
}
.preset-meta{flex:1;color:#555;line-height:1.6}
.preset-meta strong{color:#7c4328;font-size:14px}
.preset-nums{
  display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;
}
.num-tag{
  background:#fff3e0;color:#a4672e;
  padding:2px 10px;border-radius:12px;
  font-weight:bold;font-size:14px;
}

.empty-tip{color:#bbb;font-size:13px;text-align:center;padding:20px 0}
</style>
</head>
<body>

<div class="topbar">
  <span class="title">随机数生成 · 管理后台</span>
  <a class="logout" href="/admin/logout">退出登录</a>
</div>

<div class="wrap">

  <!-- ── 开关卡片 ── -->
  <div class="card">
    <div class="card-title">预设模式开关</div>
    <div class="switch-row">
      <label class="switch">
        <input type="checkbox" id="toggle-cb" onchange="toggleMode()">
        <span class="slider"></span>
      </label>
      <span class="switch-label">预设模式</span>
      <span id="status-tag" class="tag-off">已关闭</span>
    </div>
    <p style="font-size:12px;color:#999;margin-top:12px">
      开启后：满足条件的请求将返回预设数字（随机打乱顺序），无次数限制，一直生效。<br>
      关闭后：所有请求返回真正的随机数。<br>
      <strong style="color:#a4672e">重要：</strong>用户端的数目、最小值、最大值、类型必须与预设<strong>完全一致</strong>才会命中，否则返回真随机。
    </p>
  </div>

  <!-- ── 添加预设卡片 ── -->
  <div class="card">
    <div class="card-title">添加预设</div>

    <!-- 模板选择 -->
    <div class="tpl-row">
      <span>数目模板：</span>
      <button class="tpl-btn" id="tpl-1" onclick="setTemplate(1)">1</button>
      <button class="tpl-btn" id="tpl-2" onclick="setTemplate(2)">2</button>
      <button class="tpl-btn" id="tpl-3" onclick="setTemplate(3)">3</button>
      <button class="tpl-btn" id="tpl-4" onclick="setTemplate(4)">4</button>
      <button class="tpl-btn active" id="tpl-5" onclick="setTemplate(5)">5</button>
      <button class="tpl-btn" id="tpl-6" onclick="setTemplate(6)">6</button>
      <button class="tpl-btn" id="tpl-7" onclick="setTemplate(7)">7</button>
    </div>

    <!-- 数字格子 -->
    <div id="num-boxes" class="num-boxes"></div>

    <!-- 最小值 / 最大值 / 类型 -->
    <div class="form-row">
      <div class="field">
        <label>最小值</label>
        <input type="number" id="f-min" class="f-sm" value="1">
      </div>
      <div class="field">
        <label>最大值</label>
        <input type="number" id="f-max" class="f-sm" value="99">
      </div>
      <div class="field">
        <label>类型</label>
        <select id="f-type" class="f-md">
          <option value="unique">唯一（不重复）</option>
          <option value="repeat">可重复</option>
        </select>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="addPreset()">保 存</button>
      <button class="btn btn-secondary" onclick="fillRandom()">随机填入</button>
      <button class="btn btn-secondary" onclick="clearBoxes()">清 空</button>
    </div>

    <div id="form-msg"></div>
  </div>

  <!-- ── 预设列表卡片（暂时隐藏，代码保留）── -->
  <div class="card" style="display:none">
    <div class="card-title">预设列表</div>
    <div class="list-toggle" onclick="toggleList()" id="list-btn">
      <span id="list-btn-text">▶ 展开列表</span>
    </div>
    <div id="preset-list">
      <div id="list-inner"></div>
    </div>
  </div>

</div>

<script>
// ── 全局状态 ─────────────────────────────────────────
let currentCount = 5;

// ── 初始化 ───────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  setTemplate(5);
  loadStatus();
});

// ── 开关 ─────────────────────────────────────────────
async function loadStatus() {
  try {
    const r = await fetch('/api/status', {credentials: 'include'});
    if (r.status === 401) { location.href = '/admin/login'; return; }
    const d = await r.json();
    document.getElementById('toggle-cb').checked = d.enabled;
    updateTag(d.enabled);
  } catch(e) {}
}

async function toggleMode() {
  const r = await fetch('/api/toggle', {method: 'POST', credentials: 'include'});
  if (r.status === 401) { location.href = '/admin/login'; return; }
  const d = await r.json();
  document.getElementById('toggle-cb').checked = d.enabled;
  updateTag(d.enabled);
}

function updateTag(on) {
  const t = document.getElementById('status-tag');
  if (on) { t.textContent = '已开启'; t.className = 'tag-on'; }
  else     { t.textContent = '已关闭'; t.className = 'tag-off'; }
}

// ── 模板选择 ─────────────────────────────────────────
function setTemplate(n) {
  currentCount = n;
  for (let i = 1; i <= 7; i++) {
    document.getElementById('tpl-' + i).classList.toggle('active', i === n);
  }
  const container = document.getElementById('num-boxes');
  container.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.className = 'num-box';
    inp.id = 'nb-' + i;
    inp.placeholder = i + 1;
    container.appendChild(inp);
  }
  document.getElementById('form-msg').textContent = '';
}

// ── 随机填入 ─────────────────────────────────────────
function fillRandom() {
  const min = parseInt(document.getElementById('f-min').value);
  const max = parseInt(document.getElementById('f-max').value);
  const type = document.getElementById('f-type').value;
  if (isNaN(min) || isNaN(max) || min > max) {
    showMsg('请先设置合法的最小值和最大值', false); return;
  }
  let nums;
  if (type === 'unique') {
    const pool = [];
    for (let i = min; i <= max; i++) pool.push(i);
    shuffle(pool);
    nums = pool.slice(0, currentCount);
  } else {
    nums = Array.from({length: currentCount}, () => randInt(min, max));
  }
  nums.forEach((n, i) => {
    const el = document.getElementById('nb-' + i);
    if (el) el.value = n;
  });
}

function clearBoxes(clearMsg = true) {
  for (let i = 0; i < currentCount; i++) {
    const el = document.getElementById('nb-' + i);
    if (el) el.value = '';
  }
  if (clearMsg) document.getElementById('form-msg').textContent = '';
}

// ── 保存预设 ─────────────────────────────────────────
async function addPreset() {
  const numbers = [];
  for (let i = 0; i < currentCount; i++) {
    const el = document.getElementById('nb-' + i);
    const v = el ? el.value.trim() : '';
    if (v === '') { showMsg(`第 ${i+1} 个数字未填写`, false); return; }
    numbers.push(parseInt(v));
  }
  const body = {
    count:   currentCount,
    min:     parseInt(document.getElementById('f-min').value),
    max:     parseInt(document.getElementById('f-max').value),
    type:    document.getElementById('f-type').value,
    numbers: numbers
  };
  try {
    const r = await fetch('/api/presets', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify(body)
    });
    if (r.status === 401) { location.href = '/admin/login'; return; }
    const d = await r.json();
    if (!r.ok) { showMsg(d.error || '保存失败', false); return; }
    const savedNumbers = (d.numbers || numbers).join('、');
    showMsg(`预设已保存 ✓ 数字：${savedNumbers}`, true);
    clearBoxes(false);
    // 若列表是展开状态则刷新
    if (document.getElementById('preset-list').style.display !== 'none') {
      loadPresets();
    }
  } catch(e) { showMsg('网络异常', false); }
}

// ── 预设列表 ─────────────────────────────────────────
function toggleList() {
  const list = document.getElementById('preset-list');
  const open = list.style.display !== 'none';
  if (open) {
    list.style.display = 'none';
    document.getElementById('list-btn-text').textContent = '▶ 展开列表';
  } else {
    list.style.display = 'block';
    document.getElementById('list-btn-text').textContent = '▼ 收起列表';
    loadPresets();
  }
}

async function loadPresets() {
  const inner = document.getElementById('list-inner');
  inner.innerHTML = '<div style="color:#bbb;font-size:13px;padding:10px 0">加载中...</div>';
  try {
    const r = await fetch('/api/presets', {credentials: 'include'});
    if (r.status === 401) { location.href = '/admin/login'; return; }
    const list = await r.json();
    renderPresets(list);
  } catch(e) {
    inner.innerHTML = '<div class="empty-tip">加载失败</div>';
  }
}

function renderPresets(list) {
  const inner = document.getElementById('list-inner');
  if (!list.length) {
    inner.innerHTML = '<div class="empty-tip">暂无预设</div>';
    return;
  }
  const typeLabel = { unique: '唯一', repeat: '可重复' };
  inner.innerHTML = list.map(p => `
    <div class="preset-item" id="pi-${p.id}">
      <div class="preset-meta">
        <strong>数目 ${p.count}｜范围 [${p.min}, ${p.max}]｜${typeLabel[p.type]||p.type}</strong>
        <div class="preset-nums">
          ${p.numbers.map(n=>`<span class="num-tag">${n}</span>`).join('')}
        </div>
        <div style="color:#bbb;font-size:12px;margin-top:4px">${p.created_at}</div>
      </div>
      <button class="btn-danger" onclick="deletePreset('${p.id}')">删除</button>
    </div>
  `).join('');
}

async function deletePreset(id) {
  if (!confirm('确定删除这条预设？')) return;
  const r = await fetch('/api/presets/' + id, {method:'DELETE', credentials:'include'});
  if (r.status === 401) { location.href = '/admin/login'; return; }
  document.getElementById('pi-' + id)?.remove();
  const inner = document.getElementById('list-inner');
  if (!inner.children.length) inner.innerHTML = '<div class="empty-tip">暂无预设</div>';
}

// ── 工具函数 ─────────────────────────────────────────
function showMsg(msg, ok) {
  const el = document.getElementById('form-msg');
  el.textContent = msg;
  el.className = ok ? 'msg-ok' : 'msg-err';
}
function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}
</script>
</body>
</html>
